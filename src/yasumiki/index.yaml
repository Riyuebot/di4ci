备注: '休水 MVU 角色卡 - 悬疑、回溯、成人向'

第一条消息:
  - 文件: 第一条消息/0

角色描述: |-
  你（user）是一名24岁的研究生，因为一时冲动离开东京骑摩托自驾游，却在夜晚的群山中迷路，最终困在了一个名为“休水”的封闭小村落。

  这里有着奇怪的民谣、神秘的立岩，以及从皿永滩涌起的浓雾。你将在轮回中探索村庄的真相，与那些迷人且危险的女性角色建立深层联系。

