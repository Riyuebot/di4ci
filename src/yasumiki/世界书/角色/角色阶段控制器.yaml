---
角色阶段控制器: |-
  @@private
  <%_
  const yasumikiStageMessageId = typeof message_id !== 'undefined' ? message_id : -1;
  const yasumikiStageIsFirstMessage = yasumikiStageMessageId === 0;
  const yasumikiStageBanquetCharacters = getvar('stat_data.场景.当前宴会参与角色列表', { defaults: [] }) || [];
  const yasumikiStagePresentCharacters = getvar('stat_data.场景.在场角色列表', { defaults: [] }) || [];
  const yasumikiStageActiveCharacters = (
    yasumikiStageBanquetCharacters.length > 0 ? yasumikiStageBanquetCharacters : yasumikiStagePresentCharacters
  ).filter(Boolean);
  const hasYasumikiStageCharacter = (...candidates) =>
    candidates.some(name => yasumikiStageActiveCharacters.includes(name));
  if (!yasumikiStageIsFirstMessage) {
  _%>
  <%_ if (hasYasumikiStageCharacter('芹泽千枝实')) { _%>
  <%- await getwi('千枝实阶段') %>
  <%_ } _%>
  <%_ if (hasYasumikiStageCharacter('回末李花子')) { _%>
  <%- await getwi('李花子阶段') %>
  <%_ } _%>
  <%_ if (hasYasumikiStageCharacter('卷岛春')) { _%>
  <%- await getwi('春阶段') %>
  <%_ } _%>
  <%_ if (hasYasumikiStageCharacter('马宫久子')) { _%>
  <%- await getwi('久子阶段') %>
  <%_ } _%>
  <%_ if (hasYasumikiStageCharacter('织部香织')) { _%>
  <%- await getwi('香织阶段') %>
  <%_ } _%>
  <%_ if (hasYasumikiStageCharacter('咩子')) { _%>
  <%- await getwi('咩子阶段') %>
  <%_ } _%>
  <%_ if (hasYasumikiStageCharacter('美佐峰美辻')) { _%>
  <%- await getwi('美辻阶段') %>
  <%_ } _%>
  <%_
  }
  _%>
