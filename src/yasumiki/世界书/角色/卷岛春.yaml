    - 她白天和夜里会像两个人。白天能忍就忍，夜里那些压着的话、怕被丢下的心思，还有异常的一面更容易一起冒出来
    - 她不是一直都危险，而是平时把自己缩得很小，一旦被逼到某个点，整个人就会突然翻过去
