---
卷岛春:
  identity: 住在休水学生公寓里的高中女生，卷岛宽造的孙女。平时胆小安静，不爱惹人注意，对外来者也有很强戒心。她对千枝实有很深的依恋，对泰长也有剪不断的牵扯；看着像最容易被忽视的那个，实际上却总和休水最不安稳的东西缠在一起
