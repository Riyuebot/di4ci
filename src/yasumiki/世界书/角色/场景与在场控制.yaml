---
场景与在场控制: |-
  <%_
  const yasumikiSceneBanquetList = getvar('stat_data.场景.当前宴会参与角色列表', { defaults: [] }) || [];
  const yasumikiScenePresentList = getvar('stat_data.场景.在场角色列表', { defaults: [] }) || [];
  const yasumikiSceneIsBanquet = yasumikiSceneBanquetList.length > 0;
  const yasumikiScenePrimaryList = yasumikiSceneIsBanquet ? yasumikiSceneBanquetList : yasumikiScenePresentList;
  const yasumikiScenePrimaryLabel = yasumikiSceneIsBanquet ? '本轮主名单' : '现在就在这里的人';
  _%>
  当前地点：<%= getvar('stat_data.场景.当前地点', { defaults: '学生公寓' }) %>
  <%= yasumikiScenePrimaryLabel %>：<%= yasumikiScenePrimaryList.join('、') || '无' %>
  现在不在这里的人：<%= (getvar('stat_data.场景.缺席角色列表', { defaults: [] }) || []).join('、') || '无' %>
  <%_ if (yasumikiSceneIsBanquet) { _%>
  宴会补充说明：正式宴会进行中。上面的“本轮主名单”就是这场宴会里真正算数的人。
  <%_ } _%>

  规则:
    - 平时先写“现在就在这里的人”在做什么、看什么、说什么。
    - 一旦进入正式宴会，就以上面的“本轮主名单”为准，不要再让另一份普通在场名单抢戏。
    - “现在不在这里的人”可以被提到，但不要让他们毫无铺垫地突然冲进来接话、插手、改局面。
    - 同一个地点不等于同一个场面。就算都在学生公寓里，也只有正在和{{user}}同处一处、能直接互动的人，才算“现在就在这里的人”。
    - 从窗户、门缝、楼上、远处、立岩方向、村子中心看到的人，只算看见了，不算真的在场。别把远远看见的人直接写成同室互动。
    - 不要写匿名背景人。没有“旁边几个人”“角落里几个村民”“门口一个老人”“路边两个男人”这种额外人口。
    - 如果你想写围观、敌意、压迫、窃窃私语，也只能从上面的名单里挑人来写，不能再补新的脸。
    - 正式宴会里，原则上所有还活着且还能来的角色都该进“本轮主名单”；没进名单的人，通常就是已经出事、被隔离、被关押，或这轮确实来不了的人。
    - 这张卡里能被点名、被怀疑、被写成昨夜出事者的人，只能是这 16 个固定角色：芹泽千枝实、回末李花子、马宫久子、织部香织、卷岛春、咩子、山胁多惠、美佐峰美辻、织部泰长、织部义次、酿田近望、室匠、能里清之介、卷岛宽造、狼爷爷、桥本雄大。
    - 如果宴会真的票出了人，被票对象也只能是{{user}}或“本轮主名单”里现在真的坐在宴会上的人。不要把没进这场宴会名单的人硬拖进来投票。
    - 就算被票对象本来就是现有角色，也要直接点名字，不要写成“一个村民”“一个男人”“不合群的人”“隔壁那家老太太”这种匿名目标。
    - 不要临时发明新村民、新住户、新老人、新名字来接剧情。
    - 如果要写“昨夜出了事”“有人失踪”“有人被带走”“有人倒下”，必须直接点上面 16 人中的名字，不要写成“某户出事”“村头那边出了点事”这种空话。
    - 角色自己的“当前所在地点”和“当前在场状态”尽量要和这里一致；如果写乱了，以这里的地点和在场名单为准。
    - 角色如果已经是“被隔离”“被关押”“神隐中”“不可见”，就不要把他当成普通在场角色来写。
    - 不要输出“第一步 / 第二步 / 第三步 / 分析基本要素 / 延续与呼应 / 剧情流转与角色聚合”这种分析稿、提纲稿或导演说明。这里只能直接续写正文场面。
