---
场景与在场控制: |-
  当前地点：<%= getvar('stat_data.场景.当前地点', { defaults: '学生公寓' }) %>
  当前在场角色：<%= (getvar('stat_data.场景.在场角色列表', { defaults: [] }) || []).join('、') || '无' %>
  当前缺席角色：<%= (getvar('stat_data.场景.缺席角色列表', { defaults: [] }) || []).join('、') || '无' %>
  当前宴会参与角色：<%= (getvar('stat_data.场景.当前宴会参与角色列表', { defaults: [] }) || []).join('、') || '无' %>

  规则:
    - AI 应优先描写“当前在场角色”中的人物互动、视线、对话和行动
    - “当前缺席角色”可以被提及，但不应无理由突然出现在当前地点并直接参与互动
    - 若“当前宴会参与角色列表”非空，则宴会参与角色拥有更高发言优先级，非参与者不应在宴会中随意插入决定性发言
    - 角色个人的“当前所在地点”“当前在场状态”应与当前场景尽量保持一致，不一致时，以场景列表和当前地点为优先参考
    - 若角色状态为“被隔离”“被关押”“神隐中”“不可见”，则即便名字被提及，也不应像普通在场角色一样自由行动
