---
咩子:
  identity: 最早是千枝实在皿永附近捡到的失忆小女孩，因为总发出像羊一样的叫声，大家才暂时叫她“咩子”。后来更多时候是李花子在带着她、护着她。一开始谁都只能把她当成迷路孩子照顾，可她身上总有些让人没法真把她只当普通小孩看的地方
