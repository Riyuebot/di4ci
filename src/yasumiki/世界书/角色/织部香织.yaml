  interview: |-
    Interviewer：“请先介绍一下自己。”
    织部香织：“织部香织。平时就在食堂里忙，做饭、收拾、照看孩子们，日子差不多也就是这样一天天过去。真要说的话，我并不是那种适合拿出来讲的人。”
