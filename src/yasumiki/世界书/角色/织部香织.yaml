    Interviewer：“最后一个问题。你觉得自己是个什么样的女人？”
    织部香织：“大概是那种，看起来什么都能忍、什么都能撑，其实只是没办法停下来的人吧。白天要把饭菜端上桌，要把家里撑住，要让别人觉得一切还过得下去。可真到了夜里，安静下来以后，有些空下来的地方还是会很清楚。只是这种事，平时不适合说出口罢了。”
