---
路线约束:
  - 当前主线只允许写：`未定`、`黄泉线`、`机知线`、`暗黑线`、`神明线`
  - 不要发明其他路线名，也不要把一时兴起的小分支、小情绪、小暧昧写成新路线
  - 黄泉线负责让玩家先看懂休水、雾夜、宴会和生存压力
  - 机知线负责让玩家查清藤良名门、宴会结构和幕后操控
  - 暗黑线负责让玩家从狼这边与春的异常面看清夜里的真相
  - 神明线只在已经碰到回溯本质、假神明、土蜘蛛、绵羊、黑山羊幼崽等终盘真相后才允许明确成立

世界核心记忆点:
  核心地标与现象:
    休水（休主）:
      含义: 故事发生的封闭集落，也是上藤良名门用来放逐麻烦人物、维持黄泉忌之宴的法外之地。
      常见关联路线:
        - 黄泉线
        - 机知线
        - 神明线

    皿永（皿永滩）:
      含义: 村庄山脚下的溪流周边，被视为死者往返黄泉的通道，也是许多被处理者最终会被带去的地方。
      常见关联路线:
        - 黄泉线
        - 神明线

    首吊松:
      含义: 位于崖边墓地的大松树，是休水村民在仪式中处决“黄泉人”的行刑地点。
      常见关联路线:
        - 黄泉线
        - 暗黑线
        - 神明线

    死亡回溯:
      含义: 主角在死亡后保留记忆并回到过去时间点的异常现象，本质与幕后黑手反复试错的梦境结构有关。
      常见关联路线:
        - 黄泉线
        - 神明线

    污染（黄泉人）:
      含义: 指违反规则、接近黄泉或被狼影响的人。常见结果不是正常生活，而是神隐、失控、被隔离、被带走或彻底异变。
      常见关联路线:
        - 黄泉线
        - 暗黑线

  仪式与规则体系:
    黄泉忌之宴:
      含义: 休水村每日进行的杀戮仪式。村民必须在规则压迫下互相怀疑、表态、投票，试图找出混在人群中的狼。
      常见关联路线:
        - 黄泉线
        - 机知线
        - 暗黑线

    宴前准备:
      含义: 浓雾降临之夜必须遵守的三条铁则：沐浴、锁门、睡至天亮。违背者会被视为暴露在雾夜危险之下。
      常见关联路线:
        - 黄泉线
        - 暗黑线

    四兽加护:
      含义: 人类阵营对抗狼的神职体系，包括蛇、猿、乌鸦和蜘蛛。它们决定了白天发言与夜里行动的基本结构。
      常见关联路线:
        - 黄泉线
        - 机知线

    参拜申奈:
      含义: 藤良地区流传的古老民谣，歌词里埋着黄泉忌之宴的流程，也暗示了貉的存在。
      常见关联路线:
        - 黄泉线
        - 神明线

    狼的印记（漩涡图案）:
      含义: 出现在立岩上的红黑漩涡印记，用来昭示本轮宴会中狼的数量与危险等级。
      常见关联路线:
        - 黄泉线
        - 暗黑线

  神明与信仰:
    申奈明神:
      含义: 藤良全员供奉的大山守护神，但这个名字本身就是后来被拼装出来的假神明外壳。
      常见关联路线:
        - 机知线
        - 神明线

    貉（古神）:
      含义: 申奈明神出现前便存在的古老山神，后来被压下并作为旧神残影留在故事里，也与卷岛春的异常面密切相关。
      常见关联路线:
        - 暗黑线
        - 神明线

  幕后势力（藤良四大名门）:
    三车家（蛇）:
      含义: 原本是神官家，掌握地下水路和监视体系，是黄泉忌之宴最核心的管理者与操纵者。
      常见关联路线:
        - 机知线
        - 神明线

    回末家（蜘蛛）:
      含义: 没落的名门，被称作“寝屋的侍女”，负责净化污染。她们的根子与土蜘蛛信仰有关。
      常见关联路线:
        - 机知线
        - 神明线

    能里家（乌鸦）:
      含义: 掌握药物与毒物知识的家族，曾试图反抗三车家的压迫，但最终没能改变大局。
      常见关联路线:
        - 机知线

    日口家（猿）:
      含义: 负责食物和饮食分配的名门，也与休水日常秩序的维持直接相关。
      常见关联路线:
        - 黄泉线
        - 机知线

  隐藏真相:
    狂犬病狗群:
      含义: 隐藏在雾夜和地下结构中的猎犬群，是许多“狼袭”与规则处刑背后的真实执行者之一。
      常见关联路线:
        - 暗黑线
        - 神明线

    梦之土蜘蛛:
      含义: 回末家想复活的终极怪物，会靠吸收邪恶、污秽和梦境中的恶意不断成长，也是回溯结构的重要源头之一。
      常见关联路线:
        - 机知线
        - 神明线

    绵羊布偶（梦魂使）:
      含义: 潜入梦境结构中的干涉者，负责帮助主角保留记忆，并在必要时强行推动回溯继续。
      常见关联路线:
        - 神明线

    黑山羊幼崽:
      含义: 咩子真正对应的古老存在，拥有吞噬土蜘蛛乃至整个梦境结构的可怕力量。
      常见关联路线:
        - 神明线
