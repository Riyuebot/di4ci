    yasumikiPresentBanquetCharacters.length > 0 ? yasumikiPresentBanquetCharacters : yasumikiPresentCharacters
  ).filter(Boolean);
  const hasYasumikiPresentCharacter = (...candidates) => candidates.some(name => yasumikiPresentNames.includes(name));
  if (!yasumikiPresentIsFirstMessage) {
