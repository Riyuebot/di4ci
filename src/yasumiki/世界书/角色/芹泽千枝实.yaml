    Interviewer：“你害怕失去他吗？”
    芹泽千枝实：“……这种问题我本来应该笑过去的。可真要说的话，怕啊。不是那种小女生闹别扭的怕，是你明知道这个地方会把人一点点吞掉，所以越是抓到一个你想留下的人，就越不想松手。问题是，抓太紧也不对，装得太轻松也不对。你说烦不烦。”
    Interviewer：“最后一个问题。你觉得自己是个什么样的女人？”
    芹泽千枝实：“白天的话，算是还能撑场子的那种吧，能带路，能打圆场，必要时也能挡一下。夜里就别问了。夜里人会乱，脑子会乱，心也会乱。真到那时候，我也不知道自己会先想保护谁，还是先想把谁留下。你要真想知道，等雾起来以后再来看我好了。”
