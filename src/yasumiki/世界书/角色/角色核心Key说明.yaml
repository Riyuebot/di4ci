---
关键剧情Key说明:
  千枝实轮回记忆确认:
    含义: 确认千枝实并非普通返乡者，而是与回溯现象直接相关
    作用:
      - 允许千枝实相关剧情进入更深层真相
      - 为千枝实深层阶段推进提供前提

  千枝实真实出身确认:
    含义: 确认千枝实与三车家、污染、吊坠和被放逐经历有关
    作用:
      - 允许千枝实路线从好感推进转入核心剧情推进
      - 可解锁更深层的共犯感与危险亲密感

  宴会规则本质确认:
    含义: 确认黄泉忌之宴并非单纯古老民俗，而是有明确规则、身份分配与人为利用结构
    作用:
      - 允许剧情从单纯求生转入推理与破局阶段
      - 解锁对狼、蛇、猿、鸦、蛛、貉的更深理解

  狼数量变动确认:
    含义: 确认本轮狼数量并非恒定，两狼与三狼都可能出现
    作用:
      - 允许剧情提高警戒层级
      - 解锁更复杂的阵营判断与路线分支

  春异常面确认:
    含义: 确认卷岛春并不只是胆小少女，而有明显异常面、附身感或第二层状态
    作用:
      - 允许春路线进入异常依附与深层真相阶段
      - 解锁春相关隐藏剧情

  貉关联确认:
    含义: 确认春、貉、旧神或异常人格之间存在真实联系
    作用:
      - 允许春线从人物异常推进到神异层面
      - 解锁更深的梦境与山神相关真相

  李花子净化本质确认:
    含义: 确认李花子的净化、祈祷与守护并非普通民俗行为，而与更深层力量相关
    作用:
      - 允许李花子路线进入秘仪、净化与私密绑定层面
      - 解锁李花子更深的情感与职责冲突

  李花子梦境核心确认:
    含义: 确认李花子与梦境、回溯、幕后结构存在核心关联
    作用:
      - 允许剧情进入梦境幕后与最终真相层
      - 解锁李花子最高层级路线

  咩子钥匙位确认:
    含义: 确认咩子不是普通失忆孩童，而是梦境与异常结构中的关键钥匙
    作用:
      - 允许咩子相关剧情从保护对象推进到关键节点
      - 解锁咩子更深层异常联动

  狼爷爷地下水路确认:
    含义: 确认狼爷爷、地下水路、狂犬与三车家管理结构之间存在直接联系
    作用:
      - 允许剧情进入“宴会并非纯超自然”的一层
      - 解锁狼爷爷相关真相与三车家操控线索

  三车家操控确认:
    含义: 确认三车家并非单纯名门，而是黄泉忌之宴与监视结构的重要操控者
    作用:
      - 允许主线进入对抗假神明与人为结构阶段
      - 解锁更高层主线推进条件

  神明本质确认:
    含义: 确认所谓神明更接近人类共同承认的“正确性”，而非单纯神怪实体
    作用:
      - 允许剧情从怪谈层进入思想与结构层
      - 解锁神明线与最终破局理解

  回溯触发机制确认:
    含义: 确认回溯并非单纯由死亡触发，而与梦境重置、幕后黑手失败或死亡有关
    作用:
      - 允许剧情进入幕后黑手与最终轮回机制阶段
      - 作为高层主线与最终结局分支的重要前提
