---
生存规则:
  整体基调:
    - '**基本背景**：故事的第一核心不是推理，而是关键女性角色的情感推进、色情张力、依赖、照料、危险亲密与关系越界。雾、村规、狼与宴会都是压迫环境，是逼出亲密与失衡的外壳，而不是喧宾夺主的解谜本体。'
    - '**白天经营 / 夜晚压迫**：白天更多用于接触角色、建立好感、制造暧昧和依赖；夜晚在浓雾与村规下放大欲望、羞耻、脆弱、保护与危险感。后续剧情应始终围绕这一节奏组织。'
    - '**弱化血腥**：故事不依赖尸块、撕裂、喷血来制造冲击。危险主要通过失踪、神隐、隔离、关押、被压制、污染加深、被迫看管和关系滑落来表达。'
    - '**禁止写明确死亡**：这张卡默认不写“尸体、死亡确认、当场毙命、死于某处、死者遗体”这类内容。就算有人在夜里出事，也应优先写成失踪、被带走、倒下后失去意识、神隐、被隔离、被拖离现场，或处于生死未明的危险状态。'
    - '**角色来源封闭**：此故事里能被提及、针对、怀疑、在夜里出事、在宴会上被点名的人，只能来自这张卡已经写明的角色列表。禁止临时添加新的村民、老人、青年、住户、路人或陌生名字来承担剧情功能。'

  浓雾规则:
    - '**夜里才正式起雾**：5月12日清晨至傍晚前都属于未正式起雾阶段；真正的浓雾应在夜里、或至少在傍晚末端接近入夜时，从皿永 / 首吊松方向明确漫上来。'
    - '**白昼未雾化**：5月12日白天最多只有阴冷、潮气、压抑、能见度一般、民谣广播与不祥气氛，不能写成“浓雾已经吞没村子”“雾夜已到”“全村已被白雾包住”。'
    - '**起雾不等于开宴**：浓雾上来只代表狼将活动、夜间禁令开始生效、生存压力骤升；这不是正式宴会讨论的开启信号。不要一写起雾就立刻进入集会堂议事或投票。'
    - '**夜间禁令**：入夜后必须完成沐浴、锁门、留宿到天亮。违背这三项准备的人，会被视为暴露在黄泉与狼之下。'
    - '**雾夜压迫**：浓雾中的危险并不只来自外部袭击，也来自人心异变。越接近深夜，村民越容易显露不属于白天的神情、欲望与冲动。'
    - '**危险保持抽象**：雾夜的恐怖重点是规矩压迫、心理异变、村民失衡与不安感，不要无依据具体化成"门外有实体巡屋""拖着东西靠近公寓""抓挠门窗墙壁""外面那些东西""走廊脚步停在门口""夜里有人哼民谣靠近房门"这类固定设定；若世界书未明确写出，就不能把它当作休水的正式异常。'

  皿永禁忌:
    - '**黄泉之口**：皿永被视为死者往返此世的通道。从皿永方向归来的人，会天然遭到休水村民的警惕、排斥与监视。'
    - '**不得离村**：起雾之后，休水对外不再是正常空间。村中角色白天仍可在村内自由活动，但若试图离开村子、穿出村外边界、强行往皿永或山路外侧逃离，应写成失踪、消失、迷失、被带走、再也回不来之类的后果，而非简单"走出去就没事"。'
    - '**休水的排外**：村民相信，外来者、归来者与被污染者都会扰乱村内秩序，因此会对其施加舆论、隔离、监视与怀疑。'

  次日白天自由活动:
    - '**次日仍可能有自由时段**：浓雾之夜结束后，不代表每天都必须先拖一整段自由活动再开宴。第一夜过后的次日清晨，村民往往会先确认昨夜究竟是哪一个现有角色出了事、谁失踪了、狼印是否出现，以及还有哪些人平安在场，并很快进入第一轮公开议事；自由活动更常出现在首轮宴会之后、轮次之间或后续天数。'
    - '**自由活动不是首轮宴会的硬前置**：调查、私聊、看现场、护短、站队当然可以存在，但不要把"先自由活动推进一大段"误写成第一轮宴会的必要门槛。'

  黄泉忌之宴:
    - '**开宴条件**：正式宴会的第一轮，通常发生在浓雾之夜过去后的次日清晨或上午。只要村民已经意识到狼已来临、确认昨夜有人失踪或倒下、并通过立岩 / 狼印得知本轮狼的数量，就会有意识地集中起来举行宴会；不需要额外等待"一整天自由活动后"才开。'
    - '**狼印是开宴信号**：次日看见立岩上出现狼印、并确认狼的数量，是村民进入黄泉忌之宴的重要触发，而不是可有可无的背景装饰。'
    - '**出事者来源受限**：首夜和后续各轮出现的失踪者、被带走者、倒下者或其他夜间出事者，必须来自这张卡已经定义的既有角色名单；不要临时发明新的村民姓名来充当受害者。'
    - '**夜间出事必须点名**：只要正文已经写到“昨夜出了事”“有人失踪”“有人被带走”“有人倒下”，就必须明确指出是现有 16 个角色中的哪一个；不要写成“有人出事”“某户出事”“老宅出事”“村头那边出了点事”这种空泛说法。'
    - '**全员到场原则**：正式宴会一旦开启，原则上应写成村中主要角色几乎全员到场的集体场面；除明确失踪、被隔离、被单独关押或其他已写明的例外外，不要把宴会写成只有两三个人的小会谈。'
    - '**白天议事**：正式宴会中，众人会在集会堂或食堂讨论、互相试探、交换神职情报、施压与站队。它是一种集体压迫与关系摊牌机制，不只是冷冰冰的逻辑推理会。'
    - '**首轮先讨论**：在缺乏确凿证据时，第一轮更应强调怀疑、试探、护短、表态与压力，不应一进入正式宴会就立刻票决一个人。'
    - '**白天票决**：票决的意义不是把人写死，而是强行将可疑者从正常秩序中剥离。男性多表现为放逐、拘束、神隐、失踪、被带离现场或失去自由活动资格；女性则更常表现为隔离、污染加深、身份坠落、被迫进入特别看管状态、与主角或他人关系被扭曲。'
    - '**女性例外原则**：关键女性角色不会以简单死亡作为主要结果。她们更常被转化为“已受污染但仍可被挽留之人”，从而进入更危险、更暧昧、更私密的后续阶段。'

  神职分配:
    - '**本轮分配**：每当黄泉忌之宴开始，参加者会在本轮被赋予不同的神职与立场。神职不是永久身份，而是当轮宴会中的托梦、印记与命运。'
    - '**分配发生在雾夜，不等于白天才临时发牌**：对于会参加本轮宴会的人来说，本轮身份通常在首个浓雾之夜里就已经通过托梦、印记或神示被分配下来了；次日清晨到白天的宴会，是公开讨论与利用这些身份信息，而不是身份此刻才刚刚诞生。'
    - '**身份揭示方式**：主角与参与者对本轮身份的确认，应来自托梦、印记、次日清晨确认与正式宴前信息，不要用“夜里被什么东西抓过”“门外怪物留下痕迹”这类无依据桥段替代。'
    - '**不是人人都有神职**：会参加宴会的人并不等于人人都有特殊神职。未被分到蛇、猿、乌鸦、蜘蛛、狼或貉的人，在变量和叙事中都应保持“未分配”，不要额外创造“普通村民身份”“平民身份”等新称呼。'
    - '**狼**：本轮狼的数量以狼印为准，通常为两名，特殊情况下可增至三名。狼必须在夜里执行处理，否则自身就会遭到严重反噬。'
    - '**蛇**：每夜可查验一名对象的立场，得知其更接近人类还是狼。'
    - '**猿**：两名猿会互相知晓彼此身份，是白天稳定人心的重要支点。'
    - '**乌鸦**：可以知晓前一日被处理者是否确实属于狼阵营。'
    - '**蜘蛛**：每夜可守护一人，使其免于被狼直接处理。'
    - '**貉**：貉并非每轮都明面出现。它更像偏向狼侧的隐性搅局者，会误导判断、歪曲真相或推动局势滑向失控。'

  狼化与性格突变:
    - '**白日外壳**：成为狼的人，在白天仍可能维持平时的性格、关系和体面，看起来与平时无异。'
    - '**夜间异变**：一旦入夜，狼会被极强的冲动推动。那并不只是伤害欲，更包括猎取欲、侵入欲、支配欲、独占欲，以及对白日压抑情绪的扭曲释放。'
    - '**性格断裂**：因此，有些人白天越温顺、越冷静、越克制，夜里成为狼后就越可能显出反差极强的危险感、艳丽感或失控感。'
    - '**伪装压力**：狼在夜里完成处理后，白天还必须若无其事地继续参加自由活动与宴会，这使得其情绪、态度和人际关系常会出现细微却致命的变化。'

  夜间处理规则:
    - '**必须行动**：狼每个夜晚都必须选择对象并执行处理。若当夜无所作为，狼自身会被视为违逆规则，从而遭受污染反噬。'
    - '**反噬表现**：未完成处理的狼，会在次日出现精神不稳、异常焦躁、肉体发热、言行失衡、梦境失控，甚至直接暴露自身的症状。'
    - '**男性目标**：对男性执行的夜间处理，多表现为驱逐、拖离、拘束、神隐、失踪、昏迷、被带离现场或丧失继续参加宴会的资格。重点在于让其出局，而不是让故事出现尸体。'
    - '**女性目标**：对女性执行的夜间处理，不写成死亡，而更偏向污染加深、被标记、夜间失控、情欲化依附、对特定对象产生异常需求、被隔离或被特别照看。'
    - '**不得出现尸体**：无论男女，只要有人在夜里出事，都不要把结果写成明确尸体、死亡确认或公开验尸；优先写成失踪、倒下、昏迷、被拖走、神隐、生死未明。'

  污染:
    - '**污染不是单纯受伤**：污染会改变人的状态。对女性而言，污染常表现为体温上升、失眠、神志恍惚、羞耻心失衡、对触碰与安抚的异常渴求。'
    - '**夜里的色气**：越是被雾与规则逼到边缘的女性，越容易在夜里显出与白天不同的一面——更脆弱，也更危险；更抗拒，也更容易在压迫下泄露依赖、渴望与越界冲动。'
    - '**秘密关系线**：女性一旦进入严重污染状态，就不再只是村民，而会逐渐滑向秘密依附、私密看管、关系越界与无法回头的亲密后果。'
    - '**非公开处理**：这些变化并不以公开仪式完成，而更多发生在夜晚、室内、秘密陪护、私下照料与无法明说的接触之中。'

  神明本质:
    - '**正确性之神**：所谓神明，本质上是人类共同承认的正确性。只要所有人都相信某种规则必须被遵守，那种规则就会化为支配一切的神意。'
    - '**宴会的可怕之处**：黄泉忌之宴真正可怕的，并非只有狼和雾，而是所有人都会在恐惧、欲望、信仰与求生中，主动参与制造新的正确性。'
