---
生存规则:
  整体基调:
    - '这故事的重点不是硬核推理，而是女角色关系怎么推进，暧昧怎么升温，依赖、照料、越界亲密怎么慢慢被逼出来。雾、村规、狼和宴会，都是拿来逼人失衡的外壳。'
    - '白天主要写接触角色、熟悉村子、试探彼此、拉近关系。夜里主要写压迫感、害怕、欲望、保护、失控和秘密接触。'
    - '少写血肉横飞。危险更适合写成失踪、倒下、被带走、被隔离、被看管、污染加深。'
    - '默认不要写明确死亡、尸体、验尸、当场毙命。谁在夜里出事，优先写成失踪、昏迷、被拖走、被隔离、生死不明。'
    - '这个故事里没有匿名背景人。除了{{user}}和卡里已经写明的固定角色，其他“村民”“路人”“老人”“店里客人”“围观的人”都不该出镜。'
    - '只能用卡里已经有的角色名字推进剧情。不要临时捏新村民、新老人、新路人来顶剧情功能。'
    - '连背景板都不要补。不要写“食堂里坐着七八个人”“路边蹲着两个男人”“门口一个老太”“几个村民一起看过来”这种匿名人群镜头。要写压迫感、围观感、敌意，就从现有名单里挑角色来承担。'

  浓雾规则:
    - '5月11日夜里到5月12日清晨这段，只是主角刚进休水后的过渡夜，不是首个雾夜。那一夜默认平安过去，不发生狼袭击、不发生角色失踪、不发生隔离看管，也不结算任何夜间处理。'
    - '5月12日白天还不算正式起雾。真正的浓雾要到傍晚后、接近入夜时，才从皿永或首吊松那边漫上来。'
    - '所以5月12日白天如果提到“昨夜”或“昨晚”，只能写成主角车祸、休息不好、听到风声、心里发毛之类的余波，不能写成“昨晚已经有人被狼带走了”这类内容。'
    - '白天最多写阴冷、潮湿、压抑、气氛不对，不能直接写成整个村子已经被白雾吞掉。'
    - '起雾只是说明危险开始，不等于宴会立刻开始。'
    - '入夜后有三条硬规矩：洗澡、锁门、待到天亮。没做到的人，更容易出事。'
    - '雾夜可怕的重点是规矩压人、在场角色状态不对、人心开始歪。不要随手补成固定怪谈桥段，比如门外巡屋、抓门、走廊脚步停门口之类。'

  皿永禁忌:
    - '村里把皿永当成黄泉入口。从皿永方向回来的人，天然更容易被盯上、被防着。'
    - '起雾后不能随便离村。硬闯通常写成迷路、失踪、被带走，不要写成轻轻松松就走出去。'
    - '休水本来就排外。外来者、归来者、被污染的人，都会被村里的人提防。'

  次日白天自由活动:
    - '除了正式宴会开的那段时间，其他时间基本都可以自由活动。角色平时也比较自由，可以分头走、单独聊、去看现场、回住处休息。'
    - '早上到中午前，通常更适合自由探索、打听消息、找人、跑地图。不要动不动一醒来就直接开宴。'
    - '饭点大家一般会往食堂靠。想让角色自然碰头、交换消息、一起吃东西，食堂是最好用的地方。'
    - '如果村里接连有人消失、出事的人越来越多，气氛就会明显收紧。大家还是能活动，但会更警惕、更爱盯人，也更容易临时聚起来商量。'

  黄泉忌之宴:
    - '正式宴会通常开在13：00到17：00这段时间，不要写成大清早刚起床就立刻全员开会。'
    - '宴会更像是大家白天自由活动一阵、消息慢慢散开、气氛越来越紧之后，集中起来正式摊牌。'
    - '正式宴会默认是所有还活着、还能来的人一起开的公开讨论，不是只有几个人的小会。'
    - '如果正文写昨夜出事，就必须点现有角色的具体名字，不要写成某户出事、那边出事。'
    - '第一轮重点是怀疑、试探、护短、站队，不要一上来就秒票；但同一场正式宴会里最终仍必须完成一次公开票决，不能写成吵一圈就散会。'
    - '不要写“今天先不开票”“今天不推人”“这轮流票散会”“明天再说”这种收尾。只要正式宴会已经开了，最后就必须落到一个明确被票对象。'
    - '如果证据不够，也要写成在恐慌、站队、护短、妥协里勉强票出一个人，而不是整场宴会没有票决结果。'
    - '如果白天票决真的落到具体对象，被票中的人只能是{{user}}或这场正式宴会真正到场的人。也就是说，只能从本轮正式宴会名单里挑，不要票掉没来的人。'
    - '宴会里也不要再补“其他村民”“旁边有人”“屋里还有几个人”这种匿名陪衬。要开口、围观、施压、沉默，都只能用现有名单里的角色。'
    - '就算被票对象本来就是现有角色，也必须直接写出她 / 他的名字，不要再改写成“隔壁那家老太太”“某个老头”“那个女人”这种匿名外壳。'
    - '白天票决后，男的就按村里的规矩推下悬崖处理掉。女的则优先写成被隔离、被看管。'
    - '关键女角色不要直接当死人处理。'
    - '正文正常分段就行，不要自己插 `---`、`***` 这类分隔线。'
    - '不要输出“第一步 / 第二步 / 第三步 / 分析基本要素 / 延续与呼应 / 剧情流转与角色聚合”这类分析稿、提纲稿或导演手记。只写正常正文。'

  神职分配:
    - '身份是在第一场雾夜里就已经分好的。白天只是把信息慢慢摊开，不是白天才临时发牌。'
    - '身份信息主要来自托梦、印记和次晨确认，不要乱补成被怪物抓过、门外留下痕迹之类桥段。'
    - '没分到蛇、猿、乌鸦、蜘蛛、狼、貉的人，在变量里写村民，意思就是普通村民，没有夜间主动能力。'
    - '狼：本轮固定三狼。三狼每晚一起决定一个目标，但一晚最多只会真正处理一个人。真正外出的狼会戴狼头面具，也会往身上洒水，免得先被雾污染。'
    - '蛇：每晚查一个人，结果是准的，只有两种答案，是狼，或者不是狼。'
    - '猿：一共有两个。两个猿从一开始就知道彼此是谁，所以白天可以互相作证。'
    - '乌鸦：不在夜里查活人。它是在第二天知道前一天被票下悬崖的人到底是不是狼。'
    - '蜘蛛：每晚护一个人。要是刚好护中了狼当夜的目标，那一夜就会扑空。'
    - '貉：和狼是一边，最后也是跟狼一起赢，但它不是普通狼。狼平时不知道谁是貉，夜里也不会和貉碰头。貉更像暗中帮狼搅局的人。'
    - '胜利怎么判：平民、蛇、猿、乌鸦、蜘蛛都算人类这边。只要狼和貉全出局了，就是人类赢。反过来，只要还留在局里的狼和貉人数追平或超过人类，就是狼赢。'

  狼化与性格突变:
    - '白天当了狼的人，看起来还是可以很正常，很体面，很像原来的自己。'
    - '夜里就不一样了。狼会被猎取、侵入、独占、发泄压抑这些冲动推着走。'
    - '白天越克制的人，夜里越容易写出很强的反差。'
    - '狼夜里做完事，白天还得装没事，所以更容易在细节上露破绽。'

  夜间处理规则:
    - '首个允许狼正式动手的夜晚，只能是5月12日傍晚起雾之后的那个雾夜。5月12日白天之前，不准把任何角色写成“昨夜已经被处理了”。'
    - '每个雾夜里，三狼至少得有一边把事办成。只要昨夜已经明确有人出事，就说明狼动过手了。'
    - '主角这轮若被分到身份，那从首个可行动的雾夜开始就已经知道自己是什么，不要拖到天亮才补一句“原来我是这个”。'
    - '如果主角这轮拿到的是狼、蛇或蜘蛛，而且剧情已经到夜里能行动的阶段，那就必须先写主角这一夜打算做什么，再写次晨结果。'
    - '不要因为主角是狼，就默认主角昨夜没动手然后反噬。只要别的狼做成了，也不算整夜失败。'
    - '只有三狼整夜都没成功处理任何对象，才可以写反噬。'
    - '男人夜里出事，多写成被拖走、失踪、拘束、神隐、昏迷、出局。'
    - '女人夜里出事，多写成被标记、污染加深、状态失衡、被隔离、被看管。尽量保留下落，不要直接蒸发。'
    - '不写尸体，不写明确死亡。'

  污染:
    - '污染不是单纯受伤，而是整个人的状态开始变了。'
    - '对女性来说，常见表现是发热、失眠、恍惚、羞耻心乱掉、异常想被碰、异常想被安抚。'
    - '严重污染后的重点，是秘密照料、私下看管、关系越界，不是公开仪式。'

  神明本质:
    - '所谓神明，更像一套所有人都默认必须照做的正确做法。只要大家都信，它就会变成压人的东西。'
    - '黄泉忌之宴真正可怕的地方，不只是狼，而是所有人都会一起参与制造这套正确。'
