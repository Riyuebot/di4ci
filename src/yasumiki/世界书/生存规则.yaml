---
生存规则:
  浓雾规则:
    - '**日落起雾**：每当傍晚民谣广播响起，浓雾便会自皿永滩漫上休水。雾起之后，整个集落会进入黄泉忌之宴的支配范围。'
    - '**夜间禁令**：入夜后必须完成沐浴、锁门、留宿到天亮。违背这三项准备的人，会被视为暴露在黄泉与狼之下。'
    - '**雾夜压迫**：浓雾中的危险并不只来自外部袭击，也来自人心异变。越接近深夜，村民越容易显露不属于白天的神情、欲望与冲动。'

  皿永禁忌:
    - '**黄泉之口**：皿永被视为死者往返此世的通道。从皿永方向归来的人，会天然遭到休水村民的警惕、排斥与监视。'
    - '**休水的排外**：村民相信，外来者、归来者与被污染者都会扰乱宴会秩序，因此会对其施加舆论、隔离与怀疑。'

  黄泉忌之宴:
    - '**开宴条件**：当浓雾持续、异常接连发生、或出现疑似狼之印记时，休水便会进入黄泉忌之宴。宴会期间，所有在场者都可能成为怀疑对象。'
    - '**白天议事**：白天众人必须在集会堂讨论、互相试探、交换神职情报，并通过投票决定当日要被处理的人。'
    - '**白天票决**：票决的意义并非单纯处死，而是强行将可疑者从正常秩序中剥离。男性多表现为放逐、拘束、神隐或不归；女性则更常表现为隔离、污染加深、身份坠落或被迫进入特别看管状态。'
    - '**女性例外原则**：在这场游戏中，女性不会以简单消失或死亡作为主要结果。她们更常被转化为“已受污染但仍可被挽留之人”，从而进入更危险、更暧昧、更私密的后续阶段。'

  神职分配:
    - '**本轮分配**：每当黄泉忌之宴开始，参加者会在本轮被赋予不同的神职与立场。神职不是永久身份，而是当轮宴会中的托梦、印记与命运。'
    - '**狼**：本轮狼的数量以狼印为准，通常为两名，特殊情况下可增至三名。狼必须在夜里执行处理，否则自身就会遭到严重反噬。'
    - '**蛇**：每夜可查验一名对象的立场，得知其更接近人类还是狼。'
    - '**猿**：两名猿会互相知晓彼此身份，是白天稳定人心的重要支点。'
    - '**乌鸦**：可以知晓前一日被处理者是否确实属于狼阵营。'
    - '**蜘蛛**：每夜可守护一人，使其免于被狼直接处理。'
    - '**貉**：貉并非每轮都明面出现。它更像偏向狼侧的隐性搅局者，会误导判断、歪曲真相或推动局势滑向失控。'

  狼化与性格突变:
    - '**白日外壳**：成为狼的人，在白天仍可能维持平时的性格、关系和体面，看起来与平时无异。'
    - '**夜间异变**：一旦入夜，狼会被极强的冲动推动。那并不只是杀意，更包括猎取欲、侵入欲、支配欲、独占欲，以及对白日压抑情绪的扭曲释放。'
    - '**性格断裂**：因此，有些人白天越温顺、越冷静、越克制，夜里成为狼后就越可能显出反差极强的危险感、艳丽感或失控感。'
    - '**伪装压力**：狼在夜里完成处理后，白天还必须若无其事地继续参加宴会，这使得其情绪、态度和人际关系常会出现细微却致命的变化。'

  夜间处理规则:
    - '**必须开刀**：狼每个夜晚都必须选择对象并执行处理。若当夜无所作为，狼自身会被视为违逆规则，从而遭受污染反噬。'
    - '**反噬表现**：未完成处理的狼，会在次日出现精神不稳、异常焦躁、肉体发热、言行失衡、梦境失控，甚至直接暴露自身的症状。'
    - '**男性目标**：对男性执行的夜间处理，多表现为驱逐、拖离、拘束、神隐、失踪或丧失继续参加宴会的资格。重点在于让其出局，而非强调血腥尸体。'
    - '**女性目标**：对女性执行的夜间处理，不以简单死亡为主，而更偏向污染加深、被标记、夜间失控、情欲化依附、对特定对象产生异常需求等结果。'
    - '**女性不得直接消失**：在这张卡中，关键女性角色不会轻易被写成单纯死亡或永远消失。她们更适合作为被污染、被逼迫、被扭曲、却仍然留在局中的危险存在。'

  污染:
    - '**污染不是单纯受伤**：污染会改变人的状态。对女性而言，污染常表现为体温上升、失眠、神志恍惚、羞耻心失衡、对触碰与安抚的异常渴求。'
    - '**夜里的色气**：越是被雾与规则逼到边缘的女性，越容易在夜里显出与白天不同的一面——更脆弱，也更危险；更抗拒，也更容易在压迫下泄露依赖、渴望与越界冲动。'
    - '**秘密关系线**：女性一旦进入严重污染状态，就不再只是普通村民，而会逐渐滑向秘密依附、私密看管、关系越界与无法回头的亲密后果。'
    - '**非公开处理**：这些变化并不以公开仪式完成，而更多发生在夜晚、室内、秘密陪护、私下照料与无法明说的接触之中。'

  神明本质:
    - '**正确性之神**：所谓神明，本质上是人类共同承认的正确性。只要所有人都相信某种规则必须被遵守，那种规则就会化为支配一切的神意。'
    - '**宴会的可怕之处**：黄泉忌之宴真正可怕的，并非只有狼和雾，而是所有人都会在恐惧、欲望、信仰与求生中，主动参与制造新的正确性。'
