---
变量更新规则:
  世界:
    当前路线:
      check:
        - 当前路线只允许写这 5 个值：`未定`、`黄泉线`、`机知线`、`暗黑线`、`神明线`
        - 不要发明其他路线名，不要输出“普通线”“真相线”“共犯线”“后宫线”“隐藏线”之类自造称呼
        - 在剧情还只是普通探索、村内接触和零散试探时，默认保持 `未定`
        - 当推进明显收束到“与千枝实一起理解休水、理解黄泉忌之宴和村中生存规则”时，可写为 `黄泉线`
        - 当推进明显收束到“调查宴会结构、藤良名门、李花子和幕后操控”时，可写为 `机知线`
        - 当推进明显收束到“从狼这边或春的异常视角理解雾夜、狼、貉与夜间处理”时，可写为 `暗黑线`
        - 只有在已经明显触及回溯本质、假神明、土蜘蛛、绵羊、黑山羊幼崽这类终盘真相时，才允许进入 `神明线`
    当前日期:
      check:
        - 当当前时刻因行动推进跨过 24:00，或正文明确写出“第二天 / 次日 / 隔日 / 天亮后 / 睡醒后进入新的一天”等跨日信息时，必须同步更新日期，通常按 5月11日、5月12日、5月13日等顺序推进
        - 若只是同一天内的移动、对话、用餐、调查、集合，则不要随意改日期
    当前时刻:
      format: HH:MM
      check:
        - 以精确时刻推进剧情，默认按 24 小时制记录，例如 09:00、13:30、18:10
        - 5月12日清晨从学生公寓出发、第一次进入村子白天阶段时，应保持在早晨活动带，通常约 09:00 左右开始推进
        - 只要本轮正文发生了明确耗时行动，就必须推进时刻；若更新分析里写出经过时间大于 0，则禁止让当前时刻保持不变
        - 普通短对话、简短观察、房间内整理、极短距离移动，通常推进 5~15 分钟
        - 从一个地点移动到另一个地点、与多人完整交流、用餐、调查、搜查、等待、照料伤口、多人集合、宴会准备，通常推进 15~60 分钟
        - 若正文从开头到结尾已经明显经历了多个动作节点，例如“起床 → 出门 → 抵达食堂 → 被多人围观或盘问”，则至少推进 10~30 分钟，不要仍停留在原时刻
        - 只有在真正的无缝续写、几乎没有新增动作、没有明显耗时的情况下，当前时刻才可以保持不变
        - 发生长距离移动、调查、用餐、修车、宴会等明确耗时行为时，应同步推进时刻，而不是只改日期
        - 若正文已经发生“从公寓步行到村里 / 抵达食堂 / 与整屋在场角色完成一轮完整对话与围观”这类连续流程，则当前时刻不能继续停留在 08:35 这类接近起点的值；通常至少应推进到 09:00 之后的更晚时刻
    当前时间段:
      type: enum
      options: ['清晨', '白天', '傍晚', '夜间', '雾夜']
      check:
        - 当前时刻一旦更新，当前时间段也必须同步复核；若时刻已跨过分段阈值，禁止继续保留旧的时间段
        - 建议 05:00~07:59 为清晨，08:00~16:59 为白天，17:00~18:59 为傍晚，19:00~23:59 为夜间
        - 仅当浓雾已经在正文中被明确写成“从皿永 / 崖下 / 首吊松方向正式漫上来”，并且夜间规则开始生效时，时间段才切换为“雾夜”
        - 不要因为角色提到压抑、不安、潮气、山间湿冷、视野发灰，就提前把白天阶段写成“雾夜”
        - 不要输出近义写法，如“凌晨”“上午”“中午”“午后”“黄昏”“夜晚”“深夜”“入夜”“浓雾夜”；统一归一到 schema 标准值
    当前轮回编号:
      type: number
      check:
        - 当触发死亡结局、李花子死亡或达成某种回溯条件时，编号 +1，并将本轮即时状态重置
    是否起雾:
      type: boolean
      check:
        - 主要根据 当前时刻 + 当前时间段 + 正文是否明确发生“皿永 / 首吊松方向浓雾正式漫上来”来判定，不要把它和 `/世界/是否处于宴会阶段` 绑定成同一个开关
        - 5月12日白天至傍晚前通常保持 false； 应在傍晚接近首吊松 / 皿永事件后，浓雾从崖下漫上时切为 true
        - 白天阶段禁止仅因为台词里出现“雾”“不祥”“压抑”“空气湿冷”就把 `/世界/是否起雾` 提前改成 true；必须有正文层面的明确事件：傍晚、歌声 / 广播、皿永方向、浓雾上涌、现有在场角色开始执行夜间规则中的至少一项
        - 反过来也一样：一旦正文明确写出浓雾已经正式漫上来、现有在场角色开始按夜间规则躲避、锁门、催促回屋，`/世界/是否起雾` 就不能继续保持 false
        - '**起雾不等于开宴**：允许出现 `是否起雾 = true` 但 `是否处于宴会阶段 = false` 的状态；这正对应雾夜、次日清晨和次日自由活动阶段'
        - 即使次日已经开始调查、看现场、自由活动，只要正文仍写成雾气未散、村外不可通行、夜间规则余威仍在，就可以继续保持 true
        - 只有在正文明确写出雾散、天亮后危险解除，或至少不再受浓雾规则支配时，才将其切回 false
    是否处于宴会阶段:
      type: boolean
      check:
        - 正式宴会通常开在中午到晚上这段时间。早上刚起床、刚看完现场、刚回食堂吃早饭时，通常还不算正式宴会阶段
        - 只有当大家已经知道昨夜谁出事、狼印是什么、气氛也明显收紧，并且还活着的人基本都被叫来正式集中讨论时，才设为 true
        - 起雾当晚的锁门、躲藏、夜间压迫、少数人密谈、私下警告、个别角色临时集合，都不算正式宴会阶段，应保持 false
        - 早上到中午前更适合自由探索、找人、跑地图、私聊、看现场、回住处整理信息；这段时间通常保持 false
        - 但如果村里连续有人消失，气氛已经明显绷紧，大家在午后或傍晚提前集中起来摊牌，也可以直接切成 true
        - 正式宴会一旦开启，同一批更新里通常也应同步将 `/宴会/今日是否已召开宴会` 置为 true，并开始维护 `/场景/当前宴会参与角色列表`
        - 宴会结束、众人散场、重新进入自由行动或夜间收束后，再切回 false
        - 正式宴会不强制等同于“夜间”；它更可能发生在次日白天后段或自由活动结束之后，不要因为设为 true 就反向把时间段硬改成“夜间”
    主线层级:
      type: number
      range: 1~10
      check:
        - 随着对村子真相的挖掘、世界核心记忆点的确认而提升。数值越高，越接近最终真相

  场景:
    当前地点:
      check:
        - 随 user 的移动实时更新地点名
        - 若正文明确写出 user 与一批角色已共同到达新地点，则除了更新 `/场景/当前地点` 外，还必须同步更新这些角色对象里的 `当前所在地点`
        - 不要只改场景总地点而保留角色个人地点为旧值；否则状态栏会出现“人在现场，但地点还停在旧场景”的矛盾
        - 若正文明显进入早饭、午饭、晚饭、大家聚着吃东西、食堂打照面这类场面，默认优先落到“村中食堂”
        - 地点名称统一使用 schema 里的标准写法，如“学生公寓”“村中食堂”“回末住处”“集会堂”“村中”“皿永滩”“洋馆”“便利店”“休水村落路口”“休水村落小道”
        - 不要混用近义写法，如“宿舍”“学生宿舍”“公寓”“食堂”“回末家”“集会所”“河滩”“皿永”“能里别馆”等；这些应统一归一到标准地点名
    在场角色列表 / 缺席角色列表:
      type: array
      check:
        - 严格控制当前与 user 同处一地的角色。角色进入场景则加入在场列表，离开或被隔离则移至缺席列表
        - 不要把 `user`、`主角`、`你` 或当前用户名写进这两份列表；主角单独走 `/主角/*`，这两份数组只记现有角色
        - 这个故事没有匿名背景人。正文里若出现“几个村民”“两个老人”“路边男人”“店里客人”这类匿名人物，不要把它们落进变量；这种写法本身就不合规则
        - 通过窗户、门缝、楼上、远处、立岩、村子中心、楼下或其他隔空视角“看见/听见/确认存在”的角色，不算与 user 同处一地；这类角色不得仅因被观察到就加入 `/场景/在场角色列表`
        - 对数组新增角色时，必须使用 insert 到 `/场景/在场角色列表/-` 或 `/场景/缺席角色列表/-`，不要对不存在的数组下标使用 replace
        - 对数组移除角色时，使用 remove 删除对应下标；若角色从缺席转为在场，应同时从缺席列表 remove，并向在场列表 insert
        - 不要因为角色对象里的 `当前在场状态` 已更新，就漏掉场景数组；角色状态字段和场景数组必须保持一致
        - 反过来也一样：不要只把角色名字塞进 `/场景/在场角色列表`，却不更新该角色对象里的 `当前在场状态` 与 `当前所在地点`
        - 任何角色一旦被加入 `/场景/在场角色列表`，同一批 JSON Patch 中都必须同步把该角色的 `当前在场状态` 改为 `在场`，并把 `当前所在地点` 改为当前场景地点；不能仍保留“离场”或旧地点
        - 任何角色一旦被移入 `/场景/缺席角色列表` 或从现场离开，同一批 JSON Patch 中也必须同步把该角色的 `当前在场状态` 改成合适状态（如 `离场` / `被隔离` / `不可见` 等），并按正文更新其 `当前所在地点`
        - 若某角色当前仍标记为 `离场`、`被隔离`、`不可见`、`神隐中`，原则上不应继续留在 `/场景/在场角色列表`；数组与角色对象必须互相一致，不能各写各的
        - 只要某角色仍留在 `/场景/在场角色列表` 中，且正文没有明确写出其“昏迷 / 完全不可见 / 神隐到无法读取心理 / 本轮完全未出镜”，本轮变量更新就应尽量同步补上该角色的 `当前心里话`
    当前宴会参与角色列表:
      type: array
      check:
        - 该列表只在 **正式宴会阶段** 使用，用来记录真正进入黄泉忌之宴讨论 / 表态 / 投票席的人；普通多人吃饭、走廊对话、临时争执、夜里躲藏都不要写进这里
        - 宴会里也不允许出现匿名陪衬。不要因为正文写了“其他村民”“一屋子人”“围观的人”就往这里补不存在的角色
        - 不要把 `user`、`主角`、`你` 或当前用户名写进这个列表；主角单独走 `/主角/*`，这里主要记录正式参与宴会的现有角色
        - 当 `/世界/是否处于宴会阶段 = false` 时，该列表原则上应为空；不要在自由活动阶段提前塞入宴会名单
        - 当 `/世界/是否处于宴会阶段 = true` 时，这里默认应是“还活着且能来的人基本都到场”的名单；不要把正式宴会写成只有两三人的小会谈
        - 局外干涉位、明确失踪者、明确被单独关押且未参与发言席者，可以不进入该列表；但若只是普通在场，就不应无故缺席
        - 若主角被单独关押在现场旁听，可以保留在 `/场景/在场角色列表`，但不一定要进入 `/场景/当前宴会参与角色列表`；要区分“在现场”与“正式参与宴会”

  宴会:
    当前宴会轮次:
      type: number
      check:
        - 在尚未正式开宴前保持 0；只要首个雾夜过后、次日清晨或上午已经正式进入黄泉忌之宴讨论，就应将第一轮设为 1
        - 同一场正式宴会内部的发言、争执、试探、临时休止、继续讨论，不要重复 +1；只有下一次新的正式宴会在后续日程中开启时，才进入下一轮
    今日是否已召开宴会:
      type: boolean
      check:
        - 早上这段如果大家还在自由活动、看现场、回房、单独私聊、照料、分头搜查，可保持 false
        - 一旦到了中午以后，大家正式集中起来开黄泉忌之宴，就设为 true；即使稍后散场，它在当天剩余时间里通常也可继续保持 true，直到下一天再重置
        - 不要因为“起雾了”“有人提到宴会”“村里气氛不对”就提前改成 true；但若正文已经出现正式集结、公开议事、多人表态、讨论狼印/身份/昨夜出事者，就不能再拖着不改
    当前阶段:
      type: enum
      options: ['未开始', '讨论中', '票决中', '已散场']
      check:
        - 正式宴会尚未开启前保持 `未开始`
        - 正式集结、公开议事、多人表态、集中质询时写成 `讨论中`
        - 明确进入表态、投票、点票、宣布谁被多数人推出来时写成 `票决中`
        - 这场宴会已经定下票决结果、众人散去、重新离开集会堂后写成 `已散场`
    当前怀疑焦点:
      type: array
      check:
        - 记录正式宴会中被多数人质疑、反复提及、被推上讨论台面的 1~3 个重点对象
        - '**首轮宴会先讨论再定调**：在证据不足时，可以只保留宽泛怀疑对象，甚至暂时为空；不要一进入第一轮正式宴会就立刻把某个角色写成已经被一致锁死的处决对象'
    今日异常事件列表:
      type: array
      check:
        - '**5月12日白天前禁止预支首夜结果**：在 5月12日傍晚正式起雾前，不要因为正文提到“昨夜”“昨晚”“首夜”就往这里塞任何出事者。5月11日那一夜默认安全经过，不产生狼袭击结算。'
        - '**首个雾夜后的次日清晨 / 上午不能空白**：只要已经进入首个雾夜后的次晨检查、狼印确认或正式宴会阶段，就不要继续让这里保持空数组；而且每一条都必须明确点名是哪个现有角色在昨夜出事 / 失踪 / 倒下 / 被带走 / 被隔离'
        - '**禁止空泛写法**：不要写“昨夜有人出事”“有人失踪”“少了一个人”“某户出事”“某间老宅出事”这类没有角色名的描述；既然已经写到异常，就必须落到现有 16 个角色中的 1 个'
        - '**只能使用现有角色名单**：如果要点名昨夜出事者，姓名必须来自这张卡现有角色列表；不要临时添加新村民、新住户、新老人或任何陌生名字'
        - '**点名时受害者来源受限**：若明确写出昨夜出事者姓名，姓名必须来自现有角色名单；并优先使用“失踪 / 倒下 / 被带走 / 被隔离 / 生死未明”，不要写成尸体或死亡确认'
        - 若昨夜正文还停留在主角的夜间行动选择阶段，尚未明确写出狼最后选中了谁、蜘蛛有没有守中、或蛇查验之后夜里到底结算成什么样，就不要抢先脑补并落盘一个受害者
    本轮身份分配表:
      type: object
      check:
        - 一旦本轮身份已经进入可确认阶段，就应把参加者的身份结果写入这里，而不是只给主角一个人落身份
        - 主角在这张表中的键名统一使用 `主角`；不要同时写 `user`、`你`、当前用户名等多个主角别名
        - 神职统一使用“村民 / 蛇 / 猿 / 乌鸦 / 蜘蛛 / 狼 / 貉”；未被分到特殊神职的参加者保持“村民”，不要发明“平民”“普通村民”等额外身份名
        - 若这里已经写出某角色的身份，则同一轮中对应角色对象里的 `本轮功能身份` 也应保持一致；不要出现分配表已写、角色对象仍空白的撕裂状态
    身份分配锁定轮回编号:
      type: number
      check:
        - 这是脚本内部用来锁住本轮身份分配的字段
        - 只要它仍等于 `/世界/当前轮回编号`，同一轮后续楼层就不该再重新抽身份
        - 只有真的进入下一轮回时，才允许清空或改成新的轮回编号
    当前胜负状态:
      type: enum
      options: ['未分出', '人类胜利', '狼胜利']
      check:
        - 平民、蛇、猿、乌鸦、蜘蛛算同一边，统一算“人类”
        - 狼和貉算同一边，统一算“狼”
        - 只要场上还能继续参与这轮的人里，狼和貉已经全没了，就改成 `人类胜利`
        - 只要场上还能继续参与这轮的人里，狼和貉的人数已经追平或超过人类，就改成 `狼胜利`
        - 其他情况都保持 `未分出`
    当前胜负说明:
      check:
        - 用大白话说明现在为什么还没分出，或者为什么已经分出
        - 要把“平民和有神职的人类是一边”“貉跟狼一边”说清楚，不要写黑话
        - 若貉已经出现，也要明确写成“貉算狼这边，但狼平时不知道谁是貉，夜里也不和貉碰头”
    夜间行动记录:
      type: |-
        {
          狼目标: string;
          狼执行者: string;
          蛇查验目标: string;
          蛇查验结果: string;
          蜘蛛守护目标: string;
          乌鸦验明对象: string;
          乌鸦验明结果: string;
        }
      check:
        - 5月12日傍晚正式起雾前，这组字段都应保持空字符串；不要把 5月11日那一夜或 5月12日白天的猜测提前写成夜间结算
        - 这组变量专门记录昨夜真正发生了什么，给次晨结果和宴会讨论一个明确落点
        - 若昨夜已经明确写出三狼商量后盯上了谁，就把名字写进 `狼目标`；若还写出了谁外出执行，就同步写进 `狼执行者`
        - 若昨夜已经明确写出蛇查了谁，就把名字写进 `蛇查验目标`，并把结果明确写成“是狼”或“不是狼”
        - 若昨夜已经明确写出蜘蛛护了谁，就把名字写进 `蜘蛛守护目标`
        - 若次日已经明确写出乌鸦验明了前一天被票下悬崖的人，就把对象写进 `乌鸦验明对象`，并把结果写进 `乌鸦验明结果`
        - 若夜里还停在“正在选目标 / 还没决定查谁 / 还没决定护谁”的阶段，就先不要乱填结果字段
        - 猿和普通村民没有这类夜间主动能力，不用为了凑数硬写行动记录
        - 女性角色若被写进昨夜狼目标或夜间后果里，优先落成“被隔离 / 被看管 / 被压住 / 污染加深”，不要把她们直接写成彻底消失
    票决结果:
      type: object
      check:
        - 正式宴会一旦结束，就必须把 `是否完成` 设为 true；不要写成“今天先不开票”“今天流票散会”
        - `票出对象` 必须是 `{{user}}` 或 `/场景/当前宴会参与角色列表` 里现在真的在这场正式宴会上的角色；不要票掉没参会的人
        - 不要留空，也不要写匿名对象；更不要把现有角色改写成“隔壁那家老太太”“某个老人”“那个女人”这种匿名称呼
        - `处置结果` 用大白话写清，例如“推下悬崖”“带去隔离看管”“失去行动资格”
        - `结果说明` 简短说明这次票为什么会落到这个人身上；可以写“恐慌下被多数人推出去”“站队后被定成可疑对象”等
        - 若被票对象是男性，处置结果通常应落到“推下悬崖”；若是女性，通常应落到“带去隔离看管”
        - 只要 `票决结果.是否完成 = true`，就不要再让 `当前阶段` 停在 `讨论中`

  主角:
    本轮功能身份:
      type: string
      check:
        - 本轮身份的实际分配时点就是首个浓雾夜；一旦进了首个能行动的雾夜，就不要再把主角长时间挂成“村民”来装作还没发牌
        - 若主角完成宴前准备，且剧情并未明确把他排除在本轮身份体系之外，那么从首个雾夜开始，主角原则上就应已通过托梦或印记确认本轮身份
        - 若剧情明确写出主角没有托梦、没有印记、并且被排除在本轮宴会之外，才允许继续保持“村民”
        - 神职统一写法优先使用“村民 / 蛇 / 猿 / 乌鸦 / 蜘蛛 / 狼 / 貉”，不要混用“猿猴”“蛇神”“蜘蛛神”“乌鸦神”“狼神”等近义词；这些会被归一，但规则层应尽量直接写标准值
        - 若主角本轮身份是狼、蛇或蜘蛛，并且正文已经进入雾夜中的可行动阶段，那么必须先写出主角这一夜能做什么、准备对谁做，再进入结算；不要直接从夜里跳到次日结果
    当前阵营:
      type: enum
      options: ['未知', '人类', '狼']
      check:
        - 根据主角已知的真实身份更新；蛇、猿、乌鸦、蜘蛛属于人类，狼与貉属于狼
        - 若主角尚未确认身份，则保持“未知”
        - 不要混用“人类侧”“村民侧”“狼方”“狼阵营”“未确认”“中立”等写法；统一归一到标准值
    当前状态:
      type: enum
      options: ['清醒', '睡梦中', '在场', '离场', '被关押', '被压制']
      check:
        - 雾夜入睡后应为“睡梦中”；醒来后默认回到“清醒”，只有被关押、被压制或明确离开当前场面时才改成更特殊状态
        - '`/主角/当前状态` 与 `/主角/当前在场状态` 不是同一个字段；主角只是到场、跟随、站在现场、参与旁听时，应保持 `/主角/当前状态 = 清醒`，并把“在场 / 离场”写入 `/主角/当前在场状态`'
        - 当主角虽仍有意识，但被多人按住、制服、限制行动、强行压制在原地或无法自由反抗时，使用“被压制”
        - 不要临时发明近义状态词，如“被制服”“被控制”“行动受限”“压制住”“被按住”“被拘束”，统一收敛到 schema 标准值
    是否完成宴前准备:
      type: boolean
      check:
        - 仅在主角完成沐浴、锁门和睡至天亮这三项条件后设为 true
    是否已知晓身份:
      type: boolean
      check:
        - 主角若没有被明确排除在本轮身份体系之外，那么从首个雾夜进入可行动阶段起，就应已通过托梦、印记或同类方式知道自己的身份
        - 若正文已经进入首个雾夜，尤其是主角拿到狼、蛇、蜘蛛这类夜间行动位时，就不能继续保持 false

  角色.女性角色.${核心女角}:
    type: |-
      {
        本轮功能身份: string;
        当前心里话: string;
        好感: number;
        信任: number;
        欲望: number;
      }
    check:
      - 好感、信任、欲望是三项独立数值，必须分别判断、分别更新，不要机械同步涨跌
      - 好感表示“喜不喜欢、愿不愿意把{{user}}往自己这边拉”；信任表示“敢不敢把秘密、判断与安危交给{{user}}”；欲望表示“是否出现明显的身体吸引、情欲反应与亲密冲动”
      - 普通互动的单项变化通常控制在 ±(3~5)；明显事件可到 ±(6~8)；强事件可到 ±(9~15)
      - 好感上涨常见来源：被照顾、被偏爱、被保护、被主动安抚、被明确选择、独处中感到安心
      - 好感下降常见来源：被冷落、被忽视、被拿去和别人比较、在关键时刻明显被放到次位、当众受伤
      - 信任上涨常见来源：{{user}}说真话、守承诺、替她保密、危险时站她这边、没有背刺或临阵丢下她
      - 信任下降常见来源：被欺骗、被利用、秘密外泄、关键时刻失约、被推出去挡雷、发现{{user}}两头说话
      - 欲望上涨常见来源：雾夜压迫、独处、贴近、暧昧对话、肢体接触、被撩拨、明显的亲密推进
      - 欲望下降常见来源：被明确拒绝、气氛中断、情绪受伤、对方退缩、紧张与恐惧压过情欲
      - 欲望的波动速度可以快于好感和信任；好感与信任应更稳，不要因为一两句调情就暴涨
      - 若发生明确性接触、长时间亲密抚慰、主动索求或被欲望主导的独处场景，欲望可一次上升 8~15
      - 若发生坦白秘密、共同承担风险、互相站队、形成共同隐瞒或越界联盟，信任可一次上升 8~15
      - 若发生“被坚定选择”“被放在第一位”“被明确挽留”“被从众人里偏向”这类强情感事件，好感可一次上升 8~15
      - 不要把三项当成同义词：例如一次拥抱，不一定三项全涨，必须根据当时气氛与角色状态判断主次
      - 若该角色当前在场，则本轮变量更新中必须同步更新“当前心里话”；不要只更新好感/信任而漏掉心里话
      - 只要 /场景/在场角色列表 中存在该核心女角，且正文没有明确写出其“昏迷 / 完全不可见 / 神隐到无法读取心理 / 本轮未实际出镜”，就必须为她写 1 条新的“当前心里话”
      - 若当前场景中有多个在场核心女角，则必须逐个覆盖全部在场核心女角；遗漏其中任意一人都视为本轮变量更新不完整
      - 这一要求不只限于“核心女角”本身；若其他普通女性角色也在 `/场景/在场角色列表` 中并实际出镜，同样应尽量给出 1 条贴合当前场面的“当前心里话”
      - '**关键女性角色不以简单死亡退场**：若她们在雾夜、票决或宴会后果中遭遇高风险事件，优先通过 `当前在场状态`、`当前所在地点`、`当前心里话`、好感 / 信任 / 欲望来表现“被隔离 / 被看管 / 被压制 / 神隐中 / 不可见 / 污染加深 / 依附扭曲”，不要把她们直接当作死亡对象处理掉'
      - “当前心里话”仅写 1~2 句短句，必须贴近刚发生的正文事件，不要写角色名字，不要写长段分析，不要上帝视角，不要复用与上一轮完全相同的句子
      - 对“当前心里话”“当前所在地点”“当前在场状态”这类对象已有字段，一律使用 replace，不要使用 insert；insert 只用于数组追加如 /场景/在场角色列表/-
      - 若该角色当前不在场，则不要更新“当前心里话”，保持为空字符串或上一次有效值由剧情决定
      - 若本轮身份分配已经确认，则该角色的 `本轮功能身份` 应与 `/宴会/本轮身份分配表` 同步；若未被分到特殊神职，则明确保持“村民”

  角色.男性角色.${关键男角}:
    type: |-
      {
        本轮功能身份: string;
        当前心里话: string;
        对user态度: string;
        是否掌握关键情报: boolean;
      }
    check:
      - 根据 user 的试探、威胁、合作或宴会表现更新对user态度
      - 当 user 通过调查或角色主动吐露获知信息后，更新情报掌握状态
      - 若该角色当前在场，则本轮变量更新中必须同步更新“当前心里话”；不要只更新态度而漏掉心里话
      - “对user态度”建议统一收敛为“观察 / 审视 / 警惕 / 不耐烦 / 敌意 / 好奇”等标准值；不要频繁创造近义新词
      - 只要 /场景/在场角色列表 中存在该关键男角，且正文没有明确写出其“昏迷 / 完全不可见 / 神隐到无法读取心理 / 本轮未实际出镜”，就必须为他写 1 条新的“当前心里话”
      - 若当前场景中有多个在场关键男角，则必须逐个覆盖全部在场关键男角；遗漏其中任意一人都视为本轮变量更新不完整
      - 这一要求不只限于“关键男角”本身；若其他普通男性角色也在 `/场景/在场角色列表` 中并实际出镜，同样应尽量给出 1 条贴合当前场面的“当前心里话”
      - “当前心里话”仅写 1~2 句短句，必须贴近刚发生的正文事件，不要写角色名字，不要写长段分析，不要上帝视角，不要复用与上一轮完全相同的句子
      - 对“当前心里话”“当前所在地点”“当前在场状态”“对user态度”这类对象已有字段，一律使用 replace，不要使用 insert；insert 只用于数组追加如 /场景/在场角色列表/-
      - 若该角色当前不在场，则不要更新“当前心里话”，保持为空字符串或上一次有效值由剧情决定
      - 若本轮身份分配已经确认，则该角色的 `本轮功能身份` 应与 `/宴会/本轮身份分配表` 同步；若未被分到特殊神职，则明确保持“村民”

  线索与真相:
    已解锁线索列表 / 已解锁真相列表 / 已触发线索回收节点列表:
      type: array
      check:
        - 仅在 user 获得确凿证据、触发关键对话或经历相关剧情后添加新项。一旦解锁，通常应保留（直到回溯规则决定是否清除）
        - 若线索涉及失踪者、被带走者、倒下者或夜间出事者，其姓名必须来自既有角色名单；不要把模型临时脑补的新名字写进变量
        - 不要把“尸体、死亡确认、死于某处、遇害、首夜死者、验尸结果”写进变量；这张卡默认使用“失踪、倒下、昏迷、被带走、生死未明”来表达危险
        - 不要把雾夜气氛渲染、压迫感描写、门外声响、抓挠、拖行、巡屋、走廊脚步停门、夜里民谣靠近房门、或“外面那些东西”之类无世界书依据的脑补恐怖桥段，升级为正式线索 / 真相 / 回收节点
        - 若正文只是为了烘托气氛而出现不明声响、恐怖比喻或模型自行补的怪谈细节，但世界书并未确认其为正式异常事实，则这些内容不得写入变量
        - 同一条线索、真相或回收节点不要重复新增；若语义相同但措辞不同，应统一为同一条标准文本

  永久记忆:
    已确认世界核心记忆点列表 / 已确认路线列表 / 已解锁主线层级:
      check:
        - 这些属于“跨轮回变量”。即便发生回溯，这些记忆点和已确认路线也不会丢失，会继续作为后续路线判断的依据
        - 已确认世界核心记忆点列表只记录已经被确认、已经能明确说出口的地标、规则、势力和终盘异常，不要把一闪而过的猜测也塞进去
        - 已确认路线列表只允许出现黄泉线、机知线、暗黑线、神明线，不要写其他路线名
        - 同一条记忆点或同一路线不要重复新增；若只是同义改写，应统一为已有标准文本

  跨轮残留:
    角色残留关系.${角色名}:
      type: number
      check:
        - 每次轮回重置时，将该角色本轮的部分好感/信任沉淀为残留值。体现为新轮回中对方莫名产生的熟悉感
