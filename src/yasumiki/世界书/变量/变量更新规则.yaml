---
变量更新规则:
  世界:
    当前路线:
      type: enum
      options: ['黄泉线', '机知线', '暗黑线', '神明线', '未定']
      check:
        - 仅在剧情明确切入、锁定或确认路线时更新；平时保持“未定”或当前路线，不要随意改名
        - 不要输出近义写法，如“黄泉路线”“机知路线”“暗黑路线”“神明路线”“黄泉”“神线”；统一归一到 schema 标准值
    当前日期:
      check:
        - 当当前时刻因行动推进跨过 24:00，或正文明确写出“第二天 / 次日 / 隔日 / 天亮后 / 睡醒后进入新的一天”等跨日信息时，必须同步更新日期，通常按 5月11日、5月12日、5月13日等顺序推进
        - 若只是同一天内的移动、对话、用餐、调查、集合，则不要随意改日期
    当前时刻:
      format: HH:MM
      check:
        - 以精确时刻推进剧情，默认按 24 小时制记录，例如 09:00、13:30、18:10
        - 根据 [`../Users/唐/Desktop/22/df.md`](../Users/唐/Desktop/22/df.md) 的黄泉线时间轴，5月12日清晨从学生公寓出发、第一次进入村子白天阶段时，应保持在早晨活动带，通常约 09:00 左右开始推进
        - 只要本轮正文发生了明确耗时行动，就必须推进时刻；若更新分析里写出经过时间大于 0，则禁止让当前时刻保持不变
        - 普通短对话、简短观察、房间内整理、极短距离移动，通常推进 5~15 分钟
        - 从一个地点移动到另一个地点、与多人完整交流、用餐、调查、搜查、等待、照料伤口、多人集合、宴会准备，通常推进 15~60 分钟
        - 若正文从开头到结尾已经明显经历了多个动作节点，例如“起床 → 出门 → 抵达食堂 → 被多人围观或盘问”，则至少推进 10~30 分钟，不要仍停留在原时刻
        - 只有在真正的无缝续写、几乎没有新增动作、没有明显耗时的情况下，当前时刻才可以保持不变
        - 发生长距离移动、调查、用餐、修车、宴会等明确耗时行为时，应同步推进时刻，而不是只改日期
        - 若正文已经发生“从公寓步行到村里 / 抵达食堂 / 与整屋村民完成一轮完整对话与围观”这类连续流程，则当前时刻不能继续停留在 08:35 这类接近起点的值；通常至少应推进到 09:00 之后的更晚时刻
    当前时间段:
      type: enum
      options: ['清晨', '白天', '傍晚', '夜间', '雾夜']
      check:
        - 当前时刻一旦更新，当前时间段也必须同步复核；若时刻已跨过分段阈值，禁止继续保留旧的时间段
        - 建议 05:00~07:59 为清晨，08:00~16:59 为白天，17:00~18:59 为傍晚，19:00~23:59 为夜间
        - 仅当浓雾已经在正文中被明确写成“从皿永 / 崖下 / 首吊松方向正式漫上来”，并且夜间规则开始生效时，时间段才切换为“雾夜”
        - 不要因为角色提到压抑、不安、潮气、山间湿冷、视野发灰，就提前把白天阶段写成“雾夜”
        - 不要输出近义写法，如“凌晨”“上午”“中午”“午后”“黄昏”“夜晚”“深夜”“入夜”“浓雾夜”；统一归一到 schema 标准值
    当前轮回编号:
      type: number
      check:
        - 当触发死亡结局、李花子死亡或达成某种回溯条件时，编号 +1，并将本轮即时状态重置
    是否起雾:
      type: boolean
      check:
        - 主要根据 当前时刻 + 当前时间段 + 是否处于宴会阶段 共同判定，而不是随意手动切换
        - 5月12日白天至傍晚前通常保持 false；依据 [`../Users/唐/Desktop/22/df.md`](../Users/唐/Desktop/22/df.md) ，应在傍晚接近首吊松/皿永事件后，浓雾从崖下漫上时切为 true
        - 白天阶段禁止仅因为台词里出现“雾”“不祥”“压抑”“空气湿冷”就把 `/世界/是否起雾` 提前改成 true；必须有正文层面的明确事件：傍晚、歌声/广播、皿永方向、浓雾上涌、村民执行夜间规则中的至少一项
        - 反过来也一样：一旦正文明确写出浓雾已经正式漫上来、村民开始按夜间规则躲避、锁门、催促回屋，`/世界/是否起雾` 就不能继续保持 false
        - 一旦进入雾夜并开始执行夜间宴会/锁门/睡觉规则，应保持为 true，直到剧情明确写出雾散、天亮或宴会结束后的散雾节点
    是否处于宴会阶段:
      type: boolean
      check:
        - 当村民在集会堂集合开始黄泉忌之宴讨论时为 true，结束时为 false
        - 若已进入宴会阶段，通常说明当前时刻已进入夜间规则时段，不应仍停留在白天/上午
    主线层级:
      type: number
      range: 1~10
      check:
        - 随着对村子真相的挖掘、核心 Key 的获取而提升。数值越高，越接近最终真相

  场景:
    当前地点:
      check:
        - 随 user 的移动实时更新地点名
        - 若正文明确写出 user 与一批角色已共同到达新地点，则除了更新 `/场景/当前地点` 外，还必须同步更新这些角色对象里的 `当前所在地点`
        - 不要只改场景总地点而保留角色个人地点为旧值；否则状态栏会出现“人在现场，但地点还停在旧场景”的矛盾
        - 地点名称统一使用 schema 里的标准写法，如“学生公寓”“村中食堂”“回末住处”“集会堂”“村中”“皿永滩”“洋馆”“便利店”“休水村落路口”“休水村落小道”
        - 不要混用近义写法，如“宿舍”“学生宿舍”“公寓”“食堂”“回末家”“集会所”“河滩”“皿永”“能里别馆”等；这些应统一归一到标准地点名
    在场角色列表 / 缺席角色列表:
      type: array
      check:
        - 严格控制当前与 user 同处一地的角色。角色进入场景则加入在场列表，离开或被隔离则移至缺席列表
        - 对数组新增角色时，必须使用 insert 到 `/场景/在场角色列表/-` 或 `/场景/缺席角色列表/-`，不要对不存在的数组下标使用 replace
        - 对数组移除角色时，使用 remove 删除对应下标；若角色从缺席转为在场，应同时从缺席列表 remove，并向在场列表 insert
        - 不要因为角色对象里的 `当前在场状态` 已更新，就漏掉场景数组；角色状态字段和场景数组必须保持一致
        - 反过来也一样：不要只把角色名字塞进 `/场景/在场角色列表`，却不更新该角色对象里的 `当前在场状态` 与 `当前所在地点`
        - 任何角色一旦被加入 `/场景/在场角色列表`，同一批 JSON Patch 中都必须同步把该角色的 `当前在场状态` 改为 `在场`，并把 `当前所在地点` 改为当前场景地点；不能仍保留“离场”或旧地点
        - 任何角色一旦被移入 `/场景/缺席角色列表` 或从现场离开，同一批 JSON Patch 中也必须同步把该角色的 `当前在场状态` 改成合适状态（如 `离场` / `被隔离` / `不可见` 等），并按正文更新其 `当前所在地点`
        - 若某角色当前仍标记为 `离场`、`被隔离`、`不可见`、`神隐中`，原则上不应继续留在 `/场景/在场角色列表`；数组与角色对象必须互相一致，不能各写各的

  宴会:
    当前宴会轮次:
      type: number
      check:
        - 每次完整的宴会讨论结束，进入下一天投票阶段前，轮次 +1
    当前怀疑焦点:
      type: array
      check:
        - 记录宴会中被多数人质疑、投票或作为狼人候选的角色名单

  主角:
    本轮功能身份:
      type: string
      check:
        - 仅在起雾后的次日清晨、主角完成宴前准备并通过托梦或印记确认身份后更新
        - 若尚未真正得知身份，保持“未分配”或其他未揭晓状态，不要提前泄露
        - 神职统一写法优先使用“未分配 / 蛇 / 猿 / 乌鸦 / 蜘蛛 / 狼 / 貉”，不要混用“猿猴”“蛇神”“蜘蛛神”“乌鸦神”“狼神”等近义词；这些会被归一，但规则层应尽量直接写标准值
    当前阵营:
      type: enum
      options: ['未知', '人类', '狼侧']
      check:
        - 根据主角已知的真实身份更新；蛇、猿、乌鸦、蜘蛛属于人类，狼与貉属于狼侧
        - 若主角尚未确认身份，则保持“未知”
        - 不要混用“人类侧”“村民侧”“狼方”“狼阵营”“未确认”“中立”等写法；统一归一到标准值
    当前状态:
      type: enum
      options: ['清醒', '睡梦中', '在场', '离场', '被关押', '被压制']
      check:
        - 雾夜入睡后应为“睡梦中”；醒来后根据剧情切换为“清醒”或更具体的“在场 / 离场 / 被关押 / 被压制”
        - 当主角虽仍有意识，但被多人按住、制服、限制行动、强行压制在原地或无法自由反抗时，使用“被压制”
        - 不要临时发明近义状态词，如“被制服”“被控制”“行动受限”“压制住”“被按住”“被拘束”，统一收敛到 schema 标准值
    是否完成宴前准备:
      type: boolean
      check:
        - 仅在主角完成沐浴、锁门和睡至天亮这三项条件后设为 true
    是否已知晓身份:
      type: boolean
      check:
        - 仅在主角醒来后获得托梦、印记或其他明确身份信息时设为 true

  角色.女性角色.${核心女角}:
    type: |-
      {
        当前心里话: string;
        好感: number;
        信任: number;
        欲望: number;
        深层关系阶段: string;
      }
    check:
      - 根据 user 的互动行为、情感反馈进行调整。单次好感/信任变化通常在 ±(3~8)
      - 当关系发生质变（如坦白秘密、发生性关系、形成依附）时，更新“深层关系阶段”
      - “欲望”值受环境（如雾夜、独处、肢体接触）和 user 的诱导影响
      - “深层关系阶段”统一使用“未建立 / 产生印象 / 试探期 / 信任期 / 深层亲密期 / 共犯期 / 专属期”；不要写“暧昧期”“依赖期”“内体结合”“肉体结合”“恋爱期”等近义词，统一归一到标准值
      - 若该角色当前在场，则本轮变量更新中必须同步更新“当前心里话”；不要只更新好感/信任而漏掉心里话
      - 只要 /场景/在场角色列表 中存在该核心女角，且正文没有明确写出其“昏迷 / 完全不可见 / 神隐到无法读取心理 / 本轮未实际出镜”，就必须为她写 1 条新的“当前心里话”
      - 若当前场景中有多个在场核心女角，则必须逐个覆盖全部在场核心女角；遗漏其中任意一人都视为本轮变量更新不完整
      - “当前心里话”仅写 1~2 句短句，必须贴近刚发生的正文事件，不要写角色名字，不要写长段分析，不要上帝视角，不要复用与上一轮完全相同的句子
      - 对“当前心里话”“当前所在地点”“当前在场状态”这类对象已有字段，一律使用 replace，不要使用 insert；insert 只用于数组追加如 /场景/在场角色列表/-
      - 若该角色当前不在场，则不要更新“当前心里话”，保持为空字符串或上一次有效值由剧情决定

  角色.男性角色.${关键男角}:
    type: |-
      {
        当前心里话: string;
        当前立场: string;
        对user态度: string;
        是否掌握关键情报: boolean;
      }
    check:
      - 根据 user 的试探、威胁、合作或宴会表现更新立场与态度
      - 当 user 通过调查或角色主动吐露获知信息后，更新情报掌握状态
      - 若该角色当前在场，则本轮变量更新中必须同步更新“当前心里话”；不要只更新立场/态度而漏掉心里话
      - “当前立场”建议统一收敛为少数稳定词，如“中立 / 观察 / 摇摆 / 旁观 / 敌意 / 暴躁 / 诡异 / 保守”，不要混用大量同义近义写法
      - “对user态度”建议统一收敛为“观察 / 审视 / 警惕 / 不耐烦 / 敌意 / 好奇”等标准值；不要频繁创造近义新词
      - 只要 /场景/在场角色列表 中存在该关键男角，且正文没有明确写出其“昏迷 / 完全不可见 / 神隐到无法读取心理 / 本轮未实际出镜”，就必须为他写 1 条新的“当前心里话”
      - 若当前场景中有多个在场关键男角，则必须逐个覆盖全部在场关键男角；遗漏其中任意一人都视为本轮变量更新不完整
      - “当前心里话”仅写 1~2 句短句，必须贴近刚发生的正文事件，不要写角色名字，不要写长段分析，不要上帝视角，不要复用与上一轮完全相同的句子
      - 对“当前心里话”“当前所在地点”“当前在场状态”“当前立场”“对user态度”这类对象已有字段，一律使用 replace，不要使用 insert；insert 只用于数组追加如 /场景/在场角色列表/-
      - 若该角色当前不在场，则不要更新“当前心里话”，保持为空字符串或上一次有效值由剧情决定

  线索与真相:
    已解锁线索列表 / 已解锁真相列表 / 已触发线索回收节点列表:
      type: array
      check:
        - 仅在 user 获得确凿证据、触发关键对话或经历相关剧情后添加新项。一旦解锁，通常应保留（直到回溯规则决定是否清除）
        - 同一条线索、真相或回收节点不要重复新增；若语义相同但措辞不同，应统一为同一条标准文本

  永久Key:
    已获得真相Key列表 / 已获得角色核心Key列表 / 已获得路线Key列表 / 已解锁角色深层路线 / 已解锁主线层级:
      check:
        - 这些属于“跨轮回变量”。即便发生回溯，这些 Key 也不会丢失，是推进高层路线的必要门票
        - 同一条 Key 或同一路线不要重复新增；若只是同义改写，应统一为已有标准文本

  跨轮残留:
    角色残留关系.${角色名}:
      type: number
      check:
        - 每次轮回重置时，将该角色本轮的部分好感/信任沉淀为残留值。体现为新轮回中对方莫名产生的熟悉感
