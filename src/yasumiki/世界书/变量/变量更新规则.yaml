---
变量更新规则:
  世界:
    当前日期:
      check:
        - 每次角色休息、经历完整一天或发生明确的时间跳转时更新，通常按 5月11日、5月12日、5月13日等顺序推进
    当前时间段:
      type: enum
      options: ['清晨', '白天', '傍晚', '夜间', '雾夜']
      check:
        - 随剧情推进实时更新。清晨→白天→傍晚→夜间。若当晚起雾，则进入“雾夜”
    当前轮回编号:
      type: number
      check:
        - 当触发死亡结局、李花子死亡或达成某种回溯条件时，编号 +1，并将本轮即时状态重置
    是否起雾:
      type: boolean
      check:
        - 傍晚或入夜后，若满足剧本设定或偶然事件，雾气从皿永漫上，将其设为 true
    是否处于宴会阶段:
      type: boolean
      check:
        - 当村民在集会堂集合开始黄泉忌之宴讨论时为 true，结束时为 false
    主线层级:
      type: number
      range: 1~10
      check:
        - 随着对村子真相的挖掘、核心 Key 的获取而提升。数值越高，越接近最终真相

  场景:
    当前地点:
      check:
        - 随 user 的移动实时更新地点名
    在场角色列表 / 缺席角色列表:
      type: array
      check:
        - 严格控制当前与 user 同处一地的角色。角色进入场景则加入在场列表，离开或被隔离则移至缺席列表

  宴会:
    当前宴会轮次:
      type: number
      check:
        - 每次完整的宴会讨论结束，进入下一天投票阶段前，轮次 +1
    当前怀疑焦点:
      type: array
      check:
        - 记录宴会中被多数人质疑、投票或作为狼人候选的角色名单

  主角:
    本轮功能身份:
      check:
        - 仅在起雾后的次日清晨、主角完成宴前准备并通过托梦或印记确认身份后更新
        - 若尚未真正得知身份，保持为“未分配”或其他未揭晓状态，不要提前泄露
    当前阵营:
      check:
        - 根据主角已知的真实身份更新；蛇、猿、乌鸦、蜘蛛属于人类，狼与貉属于狼侧
        - 若主角尚未确认身份，则保持“未知”
    当前状态:
      check:
        - 雾夜入睡后应为“睡梦中”；醒来后根据剧情切换为“清醒”或更具体的“在场 / 离场 / 被关押”
    是否完成宴前准备:
      type: boolean
      check:
        - 仅在主角完成沐浴、锁门和睡至天亮这三项条件后设为 true
    是否已知晓身份:
      type: boolean
      check:
        - 仅在主角醒来后获得托梦、印记或其他明确身份信息时设为 true

  角色.女性角色.${核心女角}:
    type: |-
      {
        好感: number;
        信任: number;
        欲望: number;
        深层关系阶段: string;
      }
    check:
      - 根据 user 的互动行为、情感反馈进行调整。单次好感/信任变化通常在 ±(3~8)
      - 当关系发生质变（如坦白秘密、发生性关系、形成依附）时，更新“深层关系阶段”
      - “欲望”值受环境（如雾夜、独处、肢体接触）和 user 的诱导影响

  角色.男性角色.${关键男角}:
    type: |-
      {
        当前立场: string;
        对user态度: string;
        是否掌握关键情报: boolean;
      }
    check:
      - 根据 user 的试探、威胁、合作或宴会表现更新立场与态度
      - 当 user 通过调查或角色主动吐露获知信息后，更新情报掌握状态

  线索与真相:
    已解锁线索列表 / 已解锁真相列表:
      type: array
      check:
        - 仅在 user 获得确凿证据、触发关键对话或经历相关剧情后添加新项。一旦解锁，通常应保留（直到回溯规则决定是否清除）

  永久Key:
    已获得真相Key列表 / 已获得角色核心Key列表 / 已解锁主线层级:
      check:
        - 这些属于“跨轮回变量”。即便发生回溯，这些 Key 也不会丢失，是推进高层路线的必要门票

  跨轮残留:
    角色残留关系.${角色名}:
      type: number
      check:
        - 每次轮回重置时，将该角色本轮的部分好感/信任沉淀为残留值。体现为新轮回中对方莫名产生的熟悉感
